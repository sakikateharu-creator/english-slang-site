<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slang Hub 🇺🇸</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
}

header {
    text-align:center;
    padding:60px 20px;
    background:linear-gradient(135deg,#1e3a8a,#dc2626);
}

input {
    width:90%;
    max-width:600px;
    margin:20px auto;
    display:block;
    padding:15px;
    border-radius:30px;
    border:none;
}

.container {
    max-width:900px;
    margin:auto;
}

.card {
    background:rgba(30,41,59,0.7);
    margin:20px;
    padding:20px;
    border-radius:20px;
}

.word {
    font-size:26px;
    color:#3b82f6;
}

button {
    margin:5px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Slang Hub 🇺🇸</h1>
<p>English slang with translation</p>
<button onclick="toggleLang()">🌍 EN / RU</button>
</header>

<input type="text" id="search" placeholder="Search slang..." oninput="displayWords()">

<div class="container" id="container"></div>

<script>
let lang = "en";

const words = [
{word:"GOAT", en:"Greatest of all time", ru:"Лучший всех времён", example:"Messi is the GOAT."},
{word:"Sus", en:"Suspicious", ru:"Подозрительный", example:"That seems sus."},
{word:"No cap", en:"No lie", ru:"Без шуток / правда", example:"No cap, that's true."},
{word:"Cap", en:"Lie", ru:"Ложь", example:"That's cap."},
{word:"Mid", en:"Average", ru:"Так себе", example:"That movie was mid."},
{word:"Fire", en:"Very good", ru:"Очень круто", example:"This song is fire."},
{word:"Flex", en:"Show off", ru:"Понтоваться", example:"Stop flexing."},
{word:"Ghost", en:"Ignore someone", ru:"Игнорить", example:"He ghosted me."},
{word:"Salty", en:"Mad", ru:"Злой / обиженный", example:"Why you salty?"},
{word:"Bet", en:"Okay", ru:"Ок / договорились", example:"You coming? Bet."},
{word:"Lit", en:"Amazing", ru:"Огонь", example:"That party was lit."},
{word:"Lowkey", en:"A little / secretly", ru:"Немного / втайне", example:"I lowkey like it."},
{word:"Highkey", en:"Very / obviously", ru:"Очень / явно", example:"I highkey love it."},
{word:"Savage", en:"Ruthless", ru:"Жёсткий", example:"That was savage."},
{word:"Drip", en:"Stylish outfit", ru:"Стильная одежда", example:"He got drip."},
{word:"Slay", en:"Do perfectly", ru:"Сделать идеально", example:"She slayed."},
{word:"Cringe", en:"Embarrassing", ru:"Кринж", example:"That was cringe."},
{word:"Clout", en:"Fame", ru:"Популярность", example:"He wants clout."},
{word:"FOMO", en:"Fear of missing out", ru:"Страх что-то пропустить", example:"I got FOMO."},
{word:"NPC", en:"Basic person", ru:"Безликий человек", example:"He's an NPC."},
{word:"Based", en:"Confident", ru:"Уверенный в себе", example:"That's based."},
{word:"Delulu", en:"Delusional", ru:"Сумасшедший (шутливо)", example:"She's delulu."},
{word:"Valid", en:"Makes sense", ru:"Логично", example:"That's valid."}
];

function toggleLang(){
    lang = lang === "en" ? "ru" : "en";
    displayWords();
}

function displayWords(){
    const container = document.getElementById("container");
    const search = document.getElementById("search").value.toLowerCase();

    container.innerHTML = "";

    words
    .filter(item =>
        item.word.toLowerCase().includes(search) ||
        item.en.toLowerCase().includes(search) ||
        item.ru.toLowerCase().includes(search)
    )
    .forEach(item => {
        container.innerHTML += `
        <div class="card">
            <div class="word">${item.word}</div>
            <p><b>${lang === "en" ? "Meaning" : "Перевод"}:</b> ${item[lang]}</p>
            <p><b>Example:</b> ${item.example}</p>
        </div>
        `;
    });
}

displayWords();
</script>

</body>
</html>
