<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slang Hub 🇺🇸</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

:root {
  --bg: #0f172a;
  --text: white;
  --card: #1e293b;
}

.light {
  --bg: #f4f6fb;
  --text: #111;
  --card: white;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #1e3a8a, #ef4444);
  text-align: center;
  padding: 30px;
}

header h1 {
  margin: 10px 0;
}

/* TABS */
.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
}

.tab {
  padding: 10px 15px;
  border-radius: 20px;
  background: #334155;
  cursor: pointer;
}

.active {
  background: #3b82f6;
}

/* SEARCH */
.search, .add-form {
  padding: 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: none;
  margin-bottom: 10px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 10px;
}

/* CARD */
.card {
  background: var(--card);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  animation: fade 0.3s;
}

.word {
  font-size: 22px;
  color: #60a5fa;
}

.top-actions {
  float: right;
}

button {
  border: none;
  padding: 8px 12px;
  border-radius: 15px;
  margin-top: 5px;
  cursor: pointer;
}

.primary {
  background: #3b82f6;
  color: white;
}

.danger {
  background: #ef4444;
  color: white;
}

.toggle {
  position: absolute;
  right: 15px;
  top: 15px;
  cursor: pointer;
}

/* ANIMATION */
@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌙</div>

<header>
  <div style="font-size:30px;">🇺🇸</div>
  <h1>Slang Hub</h1>
  <p>Talk like a real American teenager</p>
</header>

<div class="tabs">
  <div class="tab active" onclick="setTab('all')">All</div>
  <div class="tab" onclick="setTab('fav')">Favorites</div>
</div>

<div class="search">
  <input id="search" placeholder="Search..." oninput="displayWords()">
</div>

<div class="add-form">
  <input id="w" placeholder="Word">
  <input id="m" placeholder="Meaning">
  <input id="e" placeholder="Example">
  <button class="primary" onclick="addWord()">➕ Add</button>
</div>

<div class="container" id="container"></div>

<script>
let tab = "all";

let slangWords = JSON.parse(localStorage.getItem("words")) || [
  { word:"GOAT", meaning:"Best ever", example:"Messi is GOAT" },
  { word:"Sus", meaning:"Suspicious", example:"That's sus" },
  { word:"Swag", meaning:"Cool style", example:"He got swag" },
  { word:"Flex", meaning:"Show off", example:"Stop flexing" },
  { word:"No cap", meaning:"No lie", example:"That was crazy no cap" }
];

let fav = JSON.parse(localStorage.getItem("fav")) || [];

function save(){
  localStorage.setItem("words", JSON.stringify(slangWords));
  localStorage.setItem("fav", JSON.stringify(fav));
}

function speak(t){
  let s = new SpeechSynthesisUtterance(t);
  s.lang="en-US";
  speechSynthesis.speak(s);
}

function toggleFav(w){
  fav.includes(w)? fav=fav.filter(x=>x!==w):fav.push(w);
  save(); displayWords();
}

function deleteWord(w){
  slangWords = slangWords.filter(x=>x.word!==w);
  save(); displayWords();
}

function addWord(){
  let w=document.getElementById("w").value;
  let m=document.getElementById("m").value;
  let e=document.getElementById("e").value;
  if(!w||!m||!e) return;

  slangWords.push({word:w,meaning:m,example:e});
  save(); displayWords();
}

function setTab(t){
  tab=t;
  document.querySelectorAll(".tab").forEach(el=>el.classList.remove("active"));
  event.target.classList.add("active");
  displayWords();
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

function displayWords(){
  let c=document.getElementById("container");
  let s=document.getElementById("search").value.toLowerCase();
  c.innerHTML="";

  slangWords
  .filter(x =>
    (tab==="all" || fav.includes(x.word)) &&
    (x.word.toLowerCase().includes(s) || x.meaning.toLowerCase().includes(s))
  )
  .forEach(x=>{
    c.innerHTML+=`
    <div class="card">
      <div class="top-actions">
        <span onclick="toggleFav('${x.word}')">${fav.includes(x.word)?"⭐":"☆"}</span>
        <span onclick="deleteWord('${x.word}')">🗑</span>
      </div>
      <div class="word">${x.word}</div>
      <p>${x.meaning}</p>
      <p><i>${x.example}</i></p>
      <button class="primary" onclick="speak('${x.word}')">🔊</button>
      <button class="primary" onclick="speak('${x.example}')">🎧</button>
    </div>`;
  });
}

displayWords();
</script>

</body>
</html>
