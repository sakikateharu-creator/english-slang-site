<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slang Dictionary Pro 🚀</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:white;
}

header {
    padding:20px;
    text-align:center;
    background:#1e293b;
}

input {
    width:90%;
    max-width:600px;
    padding:15px;
    border-radius:30px;
    border:none;
    margin:20px auto;
    display:block;
}

.suggestions {
    max-width:600px;
    margin:auto;
    background:#1e293b;
    border-radius:10px;
}

.suggestions div {
    padding:10px;
    cursor:pointer;
}

.suggestions div:hover {
    background:#334155;
}

.alphabet {
    text-align:center;
    padding:10px;
}

.alphabet span {
    margin:5px;
    cursor:pointer;
    opacity:0.7;
}

.container {
    max-width:900px;
    margin:auto;
}

.card {
    background:#1e293b;
    margin:15px;
    padding:20px;
    border-radius:15px;
}

.word {
    font-size:26px;
    color:#3b82f6;
}

button {
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.comment {
    background:#334155;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>Slang Dictionary Pro 🚀</h1>
</header>

<input type="text" id="search" placeholder="Search slang..." oninput="searchWords()">

<div class="suggestions" id="suggestions"></div>
<div class="alphabet" id="alphabet"></div>
<div class="container" id="container"></div>

<script>
const words = [
{word:"GOAT", meaning:"Greatest of all time", example:"Messi is the GOAT."},
{word:"Sus", meaning:"Suspicious", example:"That seems sus."},
{word:"No cap", meaning:"No lie", example:"No cap, that's true."},
{word:"Mid", meaning:"Average", example:"That movie was mid."},
{word:"Fire", meaning:"Very good", example:"This song is fire."},
{word:"Flex", meaning:"Show off", example:"Stop flexing."},
{word:"Ghost", meaning:"Ignore someone", example:"He ghosted me."},
{word:"Salty", meaning:"Mad", example:"Why you salty?"},
{word:"Bet", meaning:"Okay", example:"You coming? Bet."},
{word:"Lit", meaning:"Amazing", example:"That party was lit."},
{word:"Drip", meaning:"Stylish outfit", example:"He got drip."},
{word:"Cringe", meaning:"Embarrassing", example:"That was cringe."},
{word:"Clout", meaning:"Fame", example:"He wants clout."},
{word:"NPC", meaning:"Basic person", example:"He's an NPC."},
{word:"Based", meaning:"Confident", example:"That's based."}
];

let favorites = JSON.parse(localStorage.getItem("fav")) || [];
let votes = JSON.parse(localStorage.getItem("votes")) || {};
let comments = JSON.parse(localStorage.getItem("comments")) || {};

/* ALPHABET */
const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
alphabet.forEach(l=>{
    document.getElementById("alphabet").innerHTML += 
    `<span onclick="filterLetter('${l}')">${l}</span>`;
});

function filterLetter(letter){
    display(words.filter(w=>w.word.startsWith(letter)));
}

/* SEARCH */
function searchWords(){
    const val = document.getElementById("search").value.toLowerCase();
    const suggestions = document.getElementById("suggestions");

    if(!val){
        suggestions.innerHTML="";
        display(words);
        return;
    }

    const filtered = words.filter(w=>w.word.toLowerCase().includes(val));

    suggestions.innerHTML="";
    filtered.slice(0,5).forEach(w=>{
        suggestions.innerHTML += 
        `<div onclick="openWord('${w.word}')">${w.word}</div>`;
    });

    display(filtered);
}

/* DISPLAY */
function display(list){
    const c = document.getElementById("container");
    c.innerHTML="";

    list.forEach(w=>{
        c.innerHTML += `
        <div class="card" onclick="openWord('${w.word}')">
            <div class="word">${w.word}</div>
            <p>${w.meaning}</p>
        </div>`;
    });
}

/* WORD PAGE */
function openWord(word){
    location.hash = word;
    renderWord(word);
}

function renderWord(word){
    const w = words.find(x=>x.word===word);
    const c = document.getElementById("container");

    const v = votes[word] || {up:0,down:0};
    const comm = comments[word] || [];

    c.innerHTML = `
    <div class="card">
        <div class="word">${w.word}</div>
        <p><b>Meaning:</b> ${w.meaning}</p>
        <p><b>Example:</b> ${w.example}</p>

        <button onclick="vote('${word}','up')">👍 ${v.up}</button>
        <button onclick="vote('${word}','down')">👎 ${v.down}</button>

        <button onclick="toggleFav('${word}')">
            ${favorites.includes(word) ? "⭐ Saved" : "☆ Save"}
        </button>

        <hr>

        <h3>Comments</h3>
        <div id="comments"></div>

        <input id="commentInput" placeholder="Add comment">
        <button onclick="addComment('${word}')">Post</button>
    </div>
    `;

    const comDiv = document.getElementById("comments");
    comm.forEach(c=>{
        comDiv.innerHTML += `<div class="comment">${c}</div>`;
    });
}

/* VOTES */
function vote(word,type){
    if(!votes[word]) votes[word]={up:0,down:0};
    votes[word][type]++;
    localStorage.setItem("votes", JSON.stringify(votes));
    renderWord(word);
}

/* FAVORITES */
function toggleFav(word){
    if(favorites.includes(word)){
        favorites = favorites.filter(w=>w!==word);
    } else {
        favorites.push(word);
    }
    localStorage.setItem("fav", JSON.stringify(favorites));
    renderWord(word);
}

/* COMMENTS */
function addComment(word){
    const input = document.getElementById("commentInput");
    if(!comments[word]) comments[word]=[];
    comments[word].push(input.value);
    localStorage.setItem("comments", JSON.stringify(comments));
    renderWord(word);
}

/* INIT */
window.onload = ()=>{
    if(location.hash){
        renderWord(location.hash.replace("#",""));
    } else {
        display(words);
    }
};
</script>

</body>
</html>
