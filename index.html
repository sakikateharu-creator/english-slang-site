<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slang Hub 🇺🇸</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: white;
    overflow-x: hidden;
}

/* HEADER */
header {
    text-align: center;
    padding: 80px 20px;
    background: linear-gradient(135deg, #1e3a8a, #dc2626);
    position: relative;
}

header::after {
    content: "";
    position: absolute;
    bottom: -40px;
    left: 0;
    width: 100%;
    height: 80px;
    background: #0f172a;
    border-top-left-radius: 50px;
    border-top-right-radius: 50px;
}

header h1 {
    font-size: 50px;
    margin: 10px 0;
}

header p {
    opacity: 0.8;
}

/* SEARCH */
input {
    width: 90%;
    max-width: 600px;
    margin: 40px auto;
    display: block;
    padding: 15px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    outline: none;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
}

/* CARD */
.card {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(12px);
    margin: 20px;
    padding: 25px;
    border-radius: 20px;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 0.5s ease;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* WORD */
.word {
    font-size: 30px;
    color: #3b82f6;
}

/* BUTTON */
button {
    margin-top: 10px;
    margin-right: 10px;
    padding: 10px 20px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(59,130,246,0.5);
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(59,130,246,0.9);
}
</style>
</head>

<body>

<header>
    <div style="font-size:40px;">🇺🇸</div>
    <h1>Slang Hub</h1>
    <p>Talk like a real American teenager</p>
</header>

<input type="text" id="search" placeholder="Search slang..." oninput="displayWords()">

<div class="container" id="container"></div>

<script>
const slangWords = [
{word:"GOAT", meaning:"Greatest Of All Time", example:"Messi is the GOAT."},
{word:"Sus", meaning:"Suspicious", example:"That seems sus."},
{word:"BRB", meaning:"Be right back", example:"BRB, need food."},
{word:"AFK", meaning:"Away from keyboard", example:"I'm AFK right now."},
{word:"TTYL", meaning:"Talk to you later", example:"Gotta go, ttyl!"},
{word:"FYI", meaning:"For your information", example:"FYI, test is tomorrow."},
{word:"Swag", meaning:"Cool style", example:"He got swag."},
{word:"Lit", meaning:"Amazing", example:"That party was lit."},
{word:"Flex", meaning:"Show off", example:"Stop trying to flex."},
{word:"No cap", meaning:"No lie", example:"That was crazy, no cap."},
{word:"Cap", meaning:"Lie", example:"That's cap."},
{word:"Bet", meaning:"Okay", example:"You coming? Bet."},
{word:"Vibe", meaning:"Feeling", example:"Good vibes only."},
{word:"Lowkey", meaning:"A little", example:"I lowkey like it."},
{word:"Highkey", meaning:"Very", example:"I highkey love this."},
{word:"Ghost", meaning:"Ignore", example:"He ghosted me."},
{word:"Salty", meaning:"Mad", example:"Why you salty?"},
{word:"Fire", meaning:"Very good", example:"This song is fire."},
{word:"Savage", meaning:"Ruthless", example:"That was savage."},
{word:"Bussin", meaning:"Really tasty", example:"This food is bussin."},
{word:"Drip", meaning:"Stylish outfit", example:"He got drip."},
{word:"Mid", meaning:"Average", example:"That movie was mid."}
];

function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speechSynthesis.speak(speech);
}

function displayWords() {
    const container = document.getElementById("container");
    const search = document.getElementById("search").value.toLowerCase();

    container.innerHTML = "";

    slangWords
    .filter(item => item.word.toLowerCase().includes(search))
    .forEach(item => {
        container.innerHTML += `
        <div class="card">
            <div class="word">${item.word}</div>
            <p><b>Meaning:</b> ${item.meaning}</p>
            <p><b>Example:</b> ${item.example}</p>
            <button onclick="speak('${item.word}')">🔊 Word</button>
            <button onclick="speak('${item.example}')">🎧 Example</button>
        </div>
        `;
    });
}

displayWords();
</script>

</body>
</html>
