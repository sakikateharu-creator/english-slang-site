<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slang Hub 🇺🇸</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 60px 20px;
    background: linear-gradient(135deg, #1e3a8a, #dc2626);
}

header h1 {
    font-size: 42px;
}

.search {
    width: 90%;
    max-width: 600px;
    margin: -30px auto 20px;
    display: block;
    padding: 15px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 20px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.word {
    font-size: 26px;
    color: #3b82f6;
}

button {
    margin-top: 10px;
    margin-right: 10px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}
</style>
</head>

<body>

<header>
    <h1>🇺🇸 Slang Hub</h1>
    <p>Talk like a real American teenager</p>
</header>

<input class="search" id="search" placeholder="Search slang..." oninput="displayWords()">

<div class="container" id="container"></div>

<script>
const slangWords = [
{word:"GOAT", meaning:"Greatest Of All Time", example:"Messi is the GOAT."},
{word:"Sus", meaning:"Suspicious", example:"That seems sus."},
{word:"Cap", meaning:"Lie", example:"That's cap!"},
{word:"No cap", meaning:"No lie", example:"I'm tired, no cap."},
{word:"Bet", meaning:"Okay / Sure", example:"Bet, let's go."},
{word:"Lit", meaning:"Very fun / amazing", example:"That party was lit."},
{word:"Flex", meaning:"Show off", example:"Stop flexing your money."},
{word:"Salty", meaning:"Annoyed / mad", example:"Why are you salty?"},
{word:"Savage", meaning:"Brutal / cool", example:"That was savage."},
{word:"Ghost", meaning:"Ignore someone", example:"He ghosted me."},
{word:"Lowkey", meaning:"A little", example:"I lowkey like it."},
{word:"Highkey", meaning:"Very", example:"I highkey love this."},
{word:"Bruh", meaning:"Seriously?", example:"Bruh, what was that?"},
{word:"Vibe", meaning:"Feeling / atmosphere", example:"I like this vibe."},
{word:"Drip", meaning:"Style / outfit", example:"Nice drip!"},
{word:"Fire", meaning:"Amazing", example:"This song is fire."},
{word:"Dead", meaning:"Very funny", example:"I'm dead 😂"},
{word:"W", meaning:"Win", example:"Big W!"},
{word:"L", meaning:"Loss", example:"That's an L."},
{word:"NPC", meaning:"Boring person", example:"He acts like an NPC."},
{word:"Based", meaning:"Confident opinion", example:"That's based."},
{word:"Mid", meaning:"Average", example:"That movie was mid."},
{word:"Rizz", meaning:"Charm / flirting skill", example:"He got rizz."},
{word:"Glow up", meaning:"Big improvement", example:"She had a glow up."},
{word:"Swag", meaning:"Cool style / confidence", example:"He walks with swag."},

{word:"BTW", meaning:"By the way", example:"BTW, I'm late."},
{word:"IDK", meaning:"I don't know", example:"IDK what to do."},
{word:"THX", meaning:"Thanks", example:"Thx for your help."},
{word:"LOL", meaning:"Laughing out loud", example:"LOL that was funny."},
{word:"OMG", meaning:"Oh my God", example:"OMG I can't believe it!"},
{word:"BRB", meaning:"Be right back", example:"BRB, need food."},
{word:"AFK", meaning:"Away from keyboard", example:"I'm AFK right now."},
{word:"TTYL", meaning:"Talk to you later", example:"Gotta go, ttyl!"},
{word:"FYI", meaning:"For your information", example:"FYI, test is tomorrow."},
{word:"IMO", meaning:"In my opinion", example:"IMO it's the best."},
{word:"IRL", meaning:"In real life", example:"We met IRL."},
{word:"DM", meaning:"Direct message", example:"DM me later."},
{word:"TBH", meaning:"To be honest", example:"TBH I don't like it."},

{word:"Clout", meaning:"Fame / attention", example:"Doing it for clout."},
{word:"Chill", meaning:"Relax", example:"Just chill."},
{word:"Hype", meaning:"Excitement", example:"The hype is real."},
{word:"Stan", meaning:"Big fan", example:"I stan this artist."},
{word:"Tea", meaning:"Gossip", example:"Spill the tea!"},
{word:"Shade", meaning:"Insult indirectly", example:"She threw shade."},
{word:"Bussin", meaning:"Very tasty", example:"This food is bussin."},
{word:"Slay", meaning:"Do something perfectly", example:"She slayed that look."},
{word:"Snack", meaning:"Attractive person", example:"He's a snack."},
{word:"Simp", meaning:"Trying too hard for someone", example:"Stop being a simp."}
];

function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speechSynthesis.speak(speech);
}

function displayWords() {
    const container = document.getElementById("container");
    const search = document.getElementById("search").value.toLowerCase();
    container.innerHTML = "";

    slangWords
    .filter(item => item.word.toLowerCase().includes(search))
    .forEach(item => {
        container.innerHTML += `
        <div class="card">
            <div class="word">${item.word}</div>
            <p><b>Meaning:</b> ${item.meaning}</p>
            <p><b>Example:</b> ${item.example}</p>
            <button onclick="speak('${item.word}')">🔊 Word</button>
            <button onclick="speak('${item.example}')">🎧 Example</button>
        </div>`;
    });
}

displayWords();
</script>

</body>
</html>
