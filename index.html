<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Slang Dictionary</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
}

header {
    background: linear-gradient(135deg, #00247d, #cf142b);
    color: white;
    text-align: center;
    padding: 20px;
}

.logo {
    width: 80px;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
}

button {
    margin: 5px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #00247d;
    color: white;
}

.card {
    background: white;
    padding: 18px;
    margin: 12px 0;
    border-radius: 12px;
    border-left: 6px solid #cf142b;
}

.word {
    font-size: 22px;
    font-weight: bold;
    color: #00247d;
}

footer {
    background: #00247d;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<header>
<svg class="logo" viewBox="0 0 100 100">
    <rect width="100" height="100" rx="15" fill="#00247d"/>
    <text x="50%" y="45%" fill="white" font-size="28" text-anchor="middle">KIU</text>
</svg>

<h1>English Slang Dictionary</h1>
<p>Learn slang like a real British student 🇬🇧</p>
</header>

<div class="container">

<h2>Slang Dictionary</h2>

<input type="text" id="search" placeholder="Search slang...">

<div id="cards"></div>

<h2>Mini Translator</h2>
<textarea id="inputText" placeholder="Enter text in English..."></textarea>
<button onclick="translateText()">Translate</button>
<p id="output"></p>

</div>

<footer>
<p>KIU College Kazan • English Project</p>
</footer>

<script>
const slangWords = [
{word:"GOAT", meaning:"Greatest Of All Time", example:"Messi is the GOAT."},
{word:"Sus", meaning:"Suspicious", example:"That seems a bit sus."},
{word:"Chill", meaning:"Relax", example:"Just chill, everything is fine."},
{word:"Mate", meaning:"Friend (British)", example:"How are you, mate?"},
{word:"Flex", meaning:"Show off", example:"He is flexing his new phone."},
{word:"Cool", meaning:"Nice or good", example:"That's a cool idea!"},
{word:"Banter", meaning:"Playful jokes", example:"We had some good banter."},
{word:"Lit", meaning:"Amazing or exciting", example:"The party was lit!"},
{word:"Salty", meaning:"Angry or upset", example:"He is salty about losing."},
{word:"Noob", meaning:"Beginner", example:"I'm such a noob at this game."},
{word:"Savage", meaning:"Bold or harsh", example:"That comeback was savage."},
{word:"Cringe", meaning:"Embarrassing", example:"That video is so cringe."},
{word:"Ghost", meaning:"Ignore someone", example:"He ghosted me after the date."},
{word:"Hype", meaning:"Excitement", example:"There is so much hype around this movie."},
{word:"Low-key", meaning:"A little / secretly", example:"I low-key like this song."},
{word:"High-key", meaning:"Very / obviously", example:"I high-key love this place."},
{word:"Vibe", meaning:"Feeling or atmosphere", example:"This place has a good vibe."},
{word:"Woke", meaning:"Socially aware", example:"She is very woke about social issues."},
{word:"Broke", meaning:"No money", example:"I’m broke until next week."},
{word:"Hangry", meaning:"Angry because hungry", example:"I get hangry if I don’t eat."},
{word:"Tea", meaning:"Gossip", example:"Spill the tea!"},
{word:"Slay", meaning:"Do something very well", example:"You slayed that performance!"},
{word:"Fire", meaning:"Very good", example:"This song is fire."},
{word:"Dead", meaning:"Very funny", example:"That joke made me dead."},
{word:"Cap", meaning:"Lie", example:"That’s cap."},
{word:"No cap", meaning:"No lie / honestly", example:"This is the best, no cap."},
{word:"Bet", meaning:"Okay / agreed", example:"You coming? Bet."},
{word:"Glow up", meaning:"Big improvement", example:"He had a big glow up."},
{word:"Throw shade", meaning:"Insult indirectly", example:"She was throwing shade at him."},
{word:"Extra", meaning:"Too dramatic", example:"Stop being so extra."},

/* НОВЫЕ */
{word:"BTW", meaning:"By the way", example:"BTW, I saw your friend yesterday."},
{word:"IDK", meaning:"I don’t know", example:"IDK what to do now."},
{word:"THX", meaning:"Thanks", example:"THX for your help!"}
];

function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speechSynthesis.speak(speech);
}

function displayWords() {
    const container = document.getElementById("cards");
    const search = document.getElementById("search").value.toLowerCase();
    container.innerHTML = "";

    slangWords
        .filter(item => item.word.toLowerCase().includes(search))
        .forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <div class="word">${item.word}</div>
                    <p><strong>Meaning:</strong> ${item.meaning}</p>
                    <p><strong>Example:</strong> ${item.example}</p>
                    <button onclick="speak('${item.word}')">🔊 Listen</button>
                </div>
            `;
        });
}

function translateText() {
    document.getElementById("output").innerText =
    "👉 Use browser translate (Right click → Translate)";
}

document.getElementById("search").addEventListener("input", displayWords);

displayWords();
</script>

</body>
</html>
