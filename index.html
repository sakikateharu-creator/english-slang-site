<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slang Hub 🇺🇸</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: linear-gradient(135deg, #1e3a8a, #dc2626);
    padding: 40px 20px;
    text-align: center;
    position: relative;
}

header h1 {
    font-size: 42px;
    margin: 10px 0;
}

header p {
    opacity: 0.9;
}

.flag {
    font-size: 40px;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.search {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 15px 0;
    border-radius: 15px;
    transition: 0.3s;
    animation: fadeIn 0.5s ease;
}

.card:hover {
    transform: scale(1.02);
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

.word {
    font-size: 26px;
    color: #3b82f6;
    font-weight: bold;
}

button {
    margin-top: 10px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #3b82f6;
    color: white;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>
<div class="flag">🇺🇸</div>
<h1>Slang Hub</h1>
<p>Talk like a real American teenager</p>
</header>

<div class="container">

<input type="text" id="search" class="search" placeholder="Search slang...">

<div id="cards"></div>

</div>

<script>
const slangWords = [
{word:"GOAT", meaning:"Greatest Of All Time", example:"Messi is the GOAT."},
{word:"Sus", meaning:"Suspicious", example:"That seems sus."},
{word:"Chill", meaning:"Relax", example:"Just chill."},
{word:"Flex", meaning:"Show off", example:"He is flexing."},
{word:"Cool", meaning:"Nice", example:"That's cool!"},
{word:"Lit", meaning:"Amazing", example:"Party was lit."},
{word:"Salty", meaning:"Upset", example:"He is salty."},
{word:"Noob", meaning:"Beginner", example:"I'm a noob."},
{word:"Savage", meaning:"Harsh", example:"That was savage."},
{word:"Cringe", meaning:"Embarrassing", example:"So cringe."},
{word:"Ghost", meaning:"Ignore", example:"He ghosted me."},
{word:"Hype", meaning:"Excitement", example:"Big hype."},
{word:"Low-key", meaning:"A little", example:"I low-key like it."},
{word:"High-key", meaning:"Very", example:"I high-key love it."},
{word:"Vibe", meaning:"Atmosphere", example:"Good vibe."},
{word:"Broke", meaning:"No money", example:"I'm broke."},
{word:"Hangry", meaning:"Hungry+angry", example:"I'm hangry."},
{word:"Tea", meaning:"Gossip", example:"Spill the tea."},
{word:"Slay", meaning:"Do great", example:"You slayed."},
{word:"Fire", meaning:"Very good", example:"This is fire."},
{word:"Cap", meaning:"Lie", example:"That's cap."},
{word:"No cap", meaning:"Truth", example:"No cap."},
{word:"Bet", meaning:"Okay", example:"Bet."},
{word:"Glow up", meaning:"Improve", example:"Big glow up."},
{word:"Extra", meaning:"Too much", example:"So extra."},
{word:"BTW", meaning:"By the way", example:"BTW I saw him."},
{word:"IDK", meaning:"I don’t know", example:"IDK."},
{word:"THX", meaning:"Thanks", example:"THX bro!"}
];

function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speechSynthesis.speak(speech);
}

function displayWords() {
    const container = document.getElementById("cards");
    const search = document.getElementById("search").value.toLowerCase();
    container.innerHTML = "";

    slangWords
        .filter(item => item.word.toLowerCase().includes(search))
        .forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <div class="word">${item.word}</div>
                    <p><b>Meaning:</b> ${item.meaning}</p>
                    <p><b>Example:</b> ${item.example}</p>
                    <button onclick="speak('${item.word}')">🔊 Word</button>
                    <button onclick="speak('${item.example}')">🎧 Example</button>
                </div>
            `;
        });
}

document.getElementById("search").addEventListener("input", displayWords);
displayWords();
</script>

</body>
</html>
