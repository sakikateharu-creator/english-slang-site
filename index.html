<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slang Hub 🇺🇸</title>

<style>
* { box-sizing:border-box; transition:0.2s; }

body {
    margin:0;
    font-family:-apple-system,'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

/* HEADER */
header {
    padding:80px 20px 60px;
    text-align:center;
    background:radial-gradient(circle at top,#1e3a8a,#020617);
}

header h1 { font-size:48px; }

#daily { color:#3b82f6; margin-top:10px; }

/* SEARCH */
.search-box {
    position:sticky;
    top:0;
    padding:15px;
    background:#020617;
}

input {
    width:100%;
    max-width:600px;
    margin:auto;
    display:block;
    padding:15px;
    border-radius:30px;
    border:none;
    background:#1e293b;
    color:white;
}

/* CONTAINER */
.container { max-width:900px; margin:auto; }

/* CARD */
.card {
    background:rgba(30,41,59,0.6);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08);
    margin:20px;
    padding:25px;
    border-radius:20px;
}

.word {
    font-size:28px;
    color:#3b82f6;
}

.meaning { margin-top:10px; }

.example {
    margin-top:10px;
    opacity:0.7;
    font-size:14px;
    font-style:italic;
}

.usage {
    margin-top:10px;
    font-size:14px;
    opacity:0.8;
}

/* BUTTON */
button {
    margin-top:10px;
    margin-right:5px;
    padding:8px 14px;
    border:none;
    border-radius:20px;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Slang Hub 🇺🇸</h1>
<p>Modern slang dictionary</p>
<div id="daily"></div>
<button onclick="toggleLang()">🌍 EN / RU</button>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search slang..." oninput="displayWords()">
</div>

<div class="container" id="container"></div>

<script>
let lang = "en";

const words = [
{
word:"GOAT",
en:"Greatest of all time",
ru:"Лучший всех времён",
ex_en:"Messi is the GOAT.",
ex_ru:"Месси — лучший всех времён.",
use:"Used to describe someone who is the best ever in their field."
},
{
word:"Sus",
en:"Suspicious",
ru:"Подозрительный",
ex_en:"That seems sus.",
ex_ru:"Это выглядит подозрительно.",
use:"Used when something feels strange or untrustworthy."
},
{
word:"No cap",
en:"No lie",
ru:"Без шуток",
ex_en:"No cap, that's true.",
ex_ru:"Без шуток, это правда.",
use:"Used to emphasize honesty."
},
{
word:"Mid",
en:"Average",
ru:"Так себе",
ex_en:"That movie was mid.",
ex_ru:"Фильм был так себе.",
use:"Used to describe something not impressive."
},
{
word:"Fire",
en:"Very good",
ru:"Очень круто",
ex_en:"This song is fire.",
ex_ru:"Эта песня очень крутая.",
use:"Used to praise something amazing."
},
{
word:"Ghost",
en:"Ignore someone",
ru:"Игнорить",
ex_en:"He ghosted me.",
ex_ru:"Он меня заигнорил.",
use:"Used when someone suddenly stops replying."
},
{
word:"Rizz",
en:"Charm",
ru:"Харизма",
ex_en:"He got rizz.",
ex_ru:"У него есть харизма.",
use:"Used when someone is good at attracting others."
},
{
word:"W",
en:"Win",
ru:"Победа",
ex_en:"That's a W.",
ex_ru:"Это победа.",
use:"Used to describe success."
},
{
word:"L",
en:"Loss",
ru:"Поражение",
ex_en:"Big L.",
ex_ru:"Жёсткий проигрыш.",
use:"Used to describe failure."
}
];

/* WORD OF DAY */
const random = words[Math.floor(Math.random()*words.length)];
document.getElementById("daily").innerText = "🔥 Word of the day: " + random.word;

/* FUNCTIONS */
function toggleLang(){
    lang = lang==="en"?"ru":"en";
    displayWords();
}

function speakEN(text){
    const s = new SpeechSynthesisUtterance(text);
    s.lang="en-US";
    speechSynthesis.speak(s);
}

function speakRU(text){
    const s = new SpeechSynthesisUtterance(text);
    s.lang="ru-RU";
    speechSynthesis.speak(s);
}

function displayWords(){
    const c = document.getElementById("container");
    const search = document.getElementById("search").value.toLowerCase();

    c.innerHTML="";

    words
    .filter(w =>
        w.word.toLowerCase().includes(search) ||
        w.en.toLowerCase().includes(search) ||
        w.ru.toLowerCase().includes(search)
    )
    .forEach(w=>{
        c.innerHTML += `
        <div class="card">
            <div class="word">${w.word}</div>

            <div class="meaning">
                <b>${lang==="en"?"Meaning":"Перевод"}:</b> ${w[lang]}
            </div>

            <div class="example">🇺🇸 "${w.ex_en}"</div>
            <div class="example">🇷🇺 "${w.ex_ru}"</div>

            <div class="usage">
                💡 ${lang==="en" ? w.use : "Используется, когда: " + w.use}
            </div>

            <button onclick="speakEN('${w.word}')">🔊 EN</button>
            <button onclick="speakRU('${w.ex_ru}')">🔊 RU</button>
        </div>
        `;
    });
}

displayWords();
</script>

</body>
</html>
