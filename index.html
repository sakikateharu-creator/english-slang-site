<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlangTok 🚀</title>

<style>
:root {
    --bg:#0f172a;
    --card:#1e293b;
    --text:white;
}

body {
    margin:0;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

.card {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:0.4s;
}

.word {
    font-size:50px;
    color:#3b82f6;
}

.meaning {
    opacity:0;
    margin-top:20px;
    transition:0.3s;
    text-align:center;
    max-width:80%;
}

.show .meaning {
    opacity:1;
}

.controls {
    position:absolute;
    bottom:40px;
}

button {
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:20px;
}

.top {
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
}

.progress {
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="top">
    <div id="level">Level 1</div>
    <div class="progress" id="progress"></div>
    <div>🔥 Streak: <span id="streak">0</span></div>
</div>

<div id="card" class="card">
    <div class="word" id="word"></div>
    <div class="meaning" id="meaning"></div>
</div>

<div class="controls">
    <button onclick="reveal()">👀 Reveal</button>
    <button onclick="know()">✅ I know</button>
    <button onclick="skip()">⏭ Skip</button>
</div>

<script>
const words = [
{word:"GOAT", meaning:"Greatest of all time"},
{word:"Sus", meaning:"Suspicious or shady"},
{word:"No cap", meaning:"No lie / for real"},
{word:"Cap", meaning:"A lie"},
{word:"Mid", meaning:"Average, not impressive"},
{word:"Bussin", meaning:"Really tasty"},
{word:"Fire", meaning:"Very good or cool"},
{word:"Flex", meaning:"To show off"},
{word:"Ghost", meaning:"To ignore someone"},
{word:"Salty", meaning:"Mad or bitter"},
{word:"Bet", meaning:"Okay / deal"},
{word:"Lit", meaning:"Amazing or exciting"},
{word:"Vibe", meaning:"Feeling or atmosphere"},
{word:"Lowkey", meaning:"A little / secretly"},
{word:"Highkey", meaning:"Very / obviously"},
{word:"Savage", meaning:"Ruthless or bold"},
{word:"Drip", meaning:"Stylish outfit"},
{word:"W", meaning:"Win / success"},
{word:"L", meaning:"Loss / failure"},
{word:"Slay", meaning:"To do something extremely well"},
{word:"Cringe", meaning:"Embarrassing"},
{word:"Tea", meaning:"Gossip"},
{word:"Spill the tea", meaning:"Tell the gossip"},
{word:"GO off", meaning:"To rant or do something intensely"},
{word:"Mood", meaning:"Relatable feeling"},
{word:"Extra", meaning:"Over the top"},
{word:"Snatched", meaning:"Looking very good"},
{word:"Shade", meaning:"Subtle insult"},
{word:"Clout", meaning:"Influence or popularity"},
{word:"Stan", meaning:"A very big fan"},
{word:"Yeet", meaning:"To throw something or express excitement"},
{word:"Glow up", meaning:"Big improvement in appearance/life"},
{word:"FOMO", meaning:"Fear of missing out"},
{word:"JOMO", meaning:"Joy of missing out"},
{word:"Hits different", meaning:"Feels special"},
{word:"On point", meaning:"Perfect / exactly right"},
{word:"Dead", meaning:"Something is very funny"},
{word:"Big yikes", meaning:"Very embarrassing"},
{word:"Sheesh", meaning:"Expression of surprise"},
{word:"Main character", meaning:"Feeling like the center of attention"},
{word:"NPC", meaning:"Someone acting basic or scripted"},
{word:"Rent free", meaning:"Stuck in your head"},
{word:"Touch grass", meaning:"Go outside / stop being online"},
{word:"Ratio", meaning:"When replies outnumber likes"},
{word:"Caught in 4K", meaning:"Clearly exposed"},
{word:"IYKYK", meaning:"If you know, you know"},
{word:"Based", meaning:"Being yourself confidently"},
{word:"Delulu", meaning:"Delusional (jokingly)"},
{word:"Core memory", meaning:"Important life moment"},
{word:"It's giving", meaning:"It feels like / reminds of"},
{word:"Understood the assignment", meaning:"Did something perfectly"},
{word:"Side eye", meaning:"Suspicious look"},
{word:"Ate", meaning:"Did amazing"},
{word:"Left no crumbs", meaning:"Did perfectly, nothing left"},
{word:"BFFR", meaning:"Be for real"},
{word:"Say less", meaning:"I understand"},
{word:"Valid", meaning:"Makes sense / acceptable"}
];

/* USER DATA */
let user = JSON.parse(localStorage.getItem("user")) || {
    xp:0,
    level:1,
    streak:0,
    learned:[]
};

/* STREAK */
const today = new Date().toDateString();
if(localStorage.getItem("last") !== today){
    user.streak++;
    localStorage.setItem("last", today);
}

/* WORD LOGIC */
let current;

function nextWord(){
    current = words[Math.floor(Math.random()*words.length)];
    document.getElementById("word").innerText = current.word;
    document.getElementById("meaning").innerText = current.meaning;
    document.getElementById("card").classList.remove("show");
}

function reveal(){
    document.getElementById("card").classList.add("show");
}

function know(){
    user.xp += 10;
    if(!user.learned.includes(current.word)){
        user.learned.push(current.word);
    }

    if(user.xp >= user.level * 50){
        user.level++;
        alert("LEVEL UP 🚀");
    }

    save();
    nextWord();
}

function skip(){
    nextWord();
}

function save(){
    localStorage.setItem("user", JSON.stringify(user));
    updateUI();
}

/* UI */
function updateUI(){
    document.getElementById("level").innerText = "Level " + user.level;
    document.getElementById("streak").innerText = user.streak;
    document.getElementById("progress").innerText = user.xp + " XP";
}

/* SWIPE */
let startY = 0;

document.addEventListener("touchstart", e => {
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
    let endY = e.changedTouches[0].clientY;

    if(startY - endY > 50){
        know();
    }
    if(endY - startY > 50){
        skip();
    }
});

/* INIT */
updateUI();
nextWord();
</script>

</body>
</html>
