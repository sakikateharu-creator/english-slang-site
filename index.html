<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slang Hub 🇺🇸</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
}

/* HEADER */
header {
    text-align:center;
    padding:60px 20px;
    background:linear-gradient(135deg,#1e3a8a,#dc2626);
}

header h1 {
    font-size:40px;
}

/* SEARCH */
input {
    width:90%;
    max-width:600px;
    margin:20px auto;
    display:block;
    padding:15px;
    border-radius:30px;
    border:none;
}

/* CATEGORY */
.categories {
    text-align:center;
}

button {
    margin:5px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* CONTAINER */
.container {
    max-width:900px;
    margin:auto;
}

/* CARD */
.card {
    background:rgba(30,41,59,0.7);
    margin:20px;
    padding:20px;
    border-radius:20px;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.02);
}

.word {
    font-size:26px;
    color:#3b82f6;
}
</style>
</head>

<body>

<header>
<h1>Slang Hub 🇺🇸</h1>
<p>Real American slang dictionary</p>
</header>

<input type="text" id="search" placeholder="Search slang..." oninput="displayWords()">

<div class="categories">
<button onclick="setCategory('all')">All</button>
<button onclick="setCategory('internet')">Internet</button>
<button onclick="setCategory('chat')">Chat</button>
<button onclick="setCategory('social')">Social</button>
<button onclick="setCategory('food')">Food</button>
<button onclick="showFavorites()">⭐ Favorites</button>
</div>

<div class="container" id="container"></div>

<script>
const words = [
{word:"GOAT", meaning:"Greatest of all time", example:"Messi is the GOAT.", category:"internet"},
{word:"Sus", meaning:"Suspicious", example:"That seems sus.", category:"internet"},
{word:"No cap", meaning:"No lie", example:"No cap, that's true.", category:"chat"},
{word:"Cap", meaning:"Lie", example:"That's cap.", category:"chat"},
{word:"Mid", meaning:"Average", example:"That movie was mid.", category:"social"},
{word:"Fire", meaning:"Very good", example:"This song is fire.", category:"social"},
{word:"Flex", meaning:"Show off", example:"Stop flexing.", category:"social"},
{word:"Ghost", meaning:"Ignore someone", example:"He ghosted me.", category:"chat"},
{word:"Salty", meaning:"Mad", example:"Why you salty?", category:"social"},
{word:"Bet", meaning:"Okay", example:"You coming? Bet.", category:"chat"},
{word:"Lit", meaning:"Amazing", example:"That party was lit.", category:"social"},
{word:"Lowkey", meaning:"A little", example:"I lowkey like it.", category:"chat"},
{word:"Highkey", meaning:"Very", example:"I highkey love it.", category:"chat"},
{word:"Savage", meaning:"Ruthless", example:"That was savage.", category:"social"},
{word:"Drip", meaning:"Stylish outfit", example:"He got drip.", category:"social"},
{word:"Slay", meaning:"Do something perfectly", example:"She slayed.", category:"social"},
{word:"Cringe", meaning:"Embarrassing", example:"That was cringe.", category:"social"},
{word:"Tea", meaning:"Gossip", example:"Spill the tea.", category:"chat"},
{word:"Clout", meaning:"Fame", example:"He wants clout.", category:"internet"},
{word:"Stan", meaning:"Big fan", example:"I stan that.", category:"internet"},
{word:"Glow up", meaning:"Big improvement", example:"He had a glow up.", category:"social"},
{word:"FOMO", meaning:"Fear of missing out", example:"I got FOMO.", category:"social"},
{word:"JOMO", meaning:"Joy of missing out", example:"Enjoying staying home = JOMO.", category:"social"},
{word:"NPC", meaning:"Basic person", example:"He's an NPC.", category:"internet"},
{word:"Based", meaning:"Confident", example:"That's based.", category:"internet"},
{word:"Delulu", meaning:"Delusional", example:"She's delulu.", category:"chat"},
{word:"Valid", meaning:"Makes sense", example:"That's valid.", category:"chat"},
{word:"Sheesh", meaning:"Expression of surprise", example:"Sheesh!", category:"chat"},
{word:"Dead", meaning:"Very funny", example:"I'm dead 😂", category:"chat"},
{word:"Hits different", meaning:"Feels special", example:"This song hits different.", category:"social"},
{word:"On point", meaning:"Perfect", example:"Your outfit is on point.", category:"social"},
{word:"Big yikes", meaning:"Very embarrassing", example:"Big yikes.", category:"chat"},
{word:"Main character", meaning:"Feeling important", example:"I'm the main character.", category:"social"},
{word:"Rent free", meaning:"Stuck in your head", example:"It's living rent free.", category:"internet"},
{word:"Touch grass", meaning:"Go outside", example:"Go touch grass.", category:"internet"},
{word:"Ratio", meaning:"More replies than likes", example:"He got ratioed.", category:"internet"},
{word:"Caught in 4K", meaning:"Clearly exposed", example:"You got caught in 4K.", category:"internet"},
{word:"IYKYK", meaning:"If you know, you know", example:"IYKYK.", category:"chat"},
{word:"BFFR", meaning:"Be for real", example:"BFFR bro.", category:"chat"},
{word:"Say less", meaning:"I understand", example:"Say less.", category:"chat"},
{word:"Bussin", meaning:"Very tasty", example:"This food is bussin.", category:"food"},
{word:"Snack", meaning:"Attractive person", example:"He's a snack.", category:"social"},
{word:"Thirsty", meaning:"Desperate", example:"Stop being thirsty.", category:"social"}
];

let currentCategory = "all";
let favorites = JSON.parse(localStorage.getItem("fav")) || [];

function setCategory(cat){
    currentCategory = cat;
    displayWords();
}

function toggleFav(word){
    if(favorites.includes(word)){
        favorites = favorites.filter(w => w !== word);
    } else {
        favorites.push(word);
    }
    localStorage.setItem("fav", JSON.stringify(favorites));
    displayWords();
}

function showFavorites(){
    const container = document.getElementById("container");
    container.innerHTML = "";

    words
    .filter(w => favorites.includes(w.word))
    .forEach(createCard);
}

function speak(text){
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang="en-US";
    speechSynthesis.speak(speech);
}

function displayWords(){
    const container = document.getElementById("container");
    const search = document.getElementById("search").value.toLowerCase();

    container.innerHTML = "";

    words
    .filter(item =>
        (currentCategory === "all" || item.category === currentCategory) &&
        (item.word.toLowerCase().includes(search) ||
         item.meaning.toLowerCase().includes(search) ||
         item.example.toLowerCase().includes(search))
    )
    .forEach(createCard);
}

function createCard(item){
    const container = document.getElementById("container");

    container.innerHTML += `
    <div class="card">
        <div class="word">${item.word}</div>
        <p><b>Meaning:</b> ${item.meaning}</p>
        <p><b>Example:</b> ${item.example}</p>
        <button onclick="speak('${item.word}')">🔊</button>
        <button onclick="speak('${item.example}')">🎧</button>
        <button onclick="toggleFav('${item.word}')">
            ${favorites.includes(item.word) ? "⭐ Saved" : "☆ Save"}
        </button>
    </div>
    `;
}

displayWords();
</script>

</body>
</html>
