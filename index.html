<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slang Hub 🇺🇸</title>

<style>
* { box-sizing:border-box; transition:0.2s; }

body {
    margin:0;
    font-family:-apple-system,'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

header {
    padding:80px 20px 60px;
    text-align:center;
    background:radial-gradient(circle at top,#1e3a8a,#020617);
}

header h1 { font-size:48px; }

#daily { color:#3b82f6; margin-top:10px; }

.search-box {
    position:sticky;
    top:0;
    padding:15px;
    background:#020617;
}

input {
    width:100%;
    max-width:600px;
    margin:auto;
    display:block;
    padding:15px;
    border-radius:30px;
    border:none;
    background:#1e293b;
    color:white;
}

.container { max-width:900px; margin:auto; }

.card {
    background:rgba(30,41,59,0.6);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08);
    margin:20px;
    padding:25px;
    border-radius:20px;
}

.word {
    font-size:28px;
    color:#3b82f6;
}

.example { margin-top:10px; opacity:0.7; font-size:14px; font-style:italic; }
.usage { margin-top:10px; font-size:14px; opacity:0.8; }

button {
    margin-top:10px;
    margin-right:5px;
    padding:8px 14px;
    border:none;
    border-radius:20px;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Slang Hub 🇺🇸</h1>
<p>Modern slang dictionary</p>
<div id="daily"></div>
<button onclick="toggleLang()">🌍 EN / RU</button>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search slang..." oninput="displayWords()">
</div>

<div class="container" id="container"></div>

<script>
let lang = "en";

const words = [
{word:"GOAT",en:"Greatest of all time",ru:"Лучший всех времён",ex_en:"Messi is the GOAT.",ex_ru:"Месси — лучший всех времён.",use:"best ever"},
{word:"Sus",en:"Suspicious",ru:"Подозрительный",ex_en:"That seems sus.",ex_ru:"Это выглядит подозрительно.",use:"when something feels wrong"},
{word:"No cap",en:"No lie",ru:"Без шуток",ex_en:"No cap, that's true.",ex_ru:"Без шуток, это правда.",use:"to emphasize truth"},
{word:"Cap",en:"Lie",ru:"Ложь",ex_en:"That's cap.",ex_ru:"Это ложь.",use:"calling someone out"},
{word:"Mid",en:"Average",ru:"Так себе",ex_en:"That movie was mid.",ex_ru:"Фильм был так себе.",use:"not impressive"},
{word:"Fire",en:"Very good",ru:"Очень круто",ex_en:"This song is fire.",ex_ru:"Эта песня очень крутая.",use:"praise"},
{word:"Flex",en:"Show off",ru:"Понтоваться",ex_en:"Stop flexing.",ex_ru:"Хватит понтоваться.",use:"showing off"},
{word:"Ghost",en:"Ignore",ru:"Игнорить",ex_en:"He ghosted me.",ex_ru:"Он меня заигнорил.",use:"stop replying"},
{word:"Salty",en:"Mad",ru:"Злой",ex_en:"Why you salty?",ex_ru:"Чё ты злишься?",use:"annoyed"},
{word:"Bet",en:"Okay",ru:"Ок",ex_en:"You coming? Bet.",ex_ru:"Ты идёшь? Ок.",use:"agreement"},
{word:"Lit",en:"Amazing",ru:"Огонь",ex_en:"That party was lit.",ex_ru:"Вечеринка была огонь.",use:"fun events"},
{word:"Lowkey",en:"A little",ru:"Немного",ex_en:"I lowkey like it.",ex_ru:"Мне немного нравится.",use:"hidden feeling"},
{word:"Highkey",en:"Very",ru:"Очень",ex_en:"I highkey love it.",ex_ru:"Мне очень нравится.",use:"strong feeling"},
{word:"Savage",en:"Ruthless",ru:"Жёсткий",ex_en:"That was savage.",ex_ru:"Это было жёстко.",use:"brutal action"},
{word:"Drip",en:"Style",ru:"Стиль",ex_en:"He got drip.",ex_ru:"У него стиль.",use:"fashion"},
{word:"Cringe",en:"Embarrassing",ru:"Кринж",ex_en:"That was cringe.",ex_ru:"Это кринж.",use:"awkward"},
{word:"Clout",en:"Fame",ru:"Популярность",ex_en:"He wants clout.",ex_ru:"Он хочет популярности.",use:"attention"},
{word:"FOMO",en:"Fear of missing out",ru:"Страх пропустить",ex_en:"I got FOMO.",ex_ru:"У меня FOMO.",use:"fear"},
{word:"NPC",en:"Basic person",ru:"Обычный человек",ex_en:"He's an NPC.",ex_ru:"Он как NPC.",use:"boring person"},
{word:"Based",en:"Confident",ru:"Уверенный",ex_en:"That's based.",ex_ru:"Это круто.",use:"respect"},
{word:"Rizz",en:"Charm",ru:"Харизма",ex_en:"He got rizz.",ex_ru:"У него харизма.",use:"attraction"},
{word:"Cooked",en:"In trouble",ru:"Попал",ex_en:"You're cooked.",ex_ru:"Ты попал.",use:"bad situation"},
{word:"Glow up",en:"Big improvement",ru:"Преображение",ex_en:"She had a glow up.",ex_ru:"Она преобразилась.",use:"appearance change"},
{word:"Tea",en:"Gossip",ru:"Сплетни",ex_en:"Spill the tea.",ex_ru:"Расскажи сплетни.",use:"drama"},
{word:"W",en:"Win",ru:"Победа",ex_en:"That's a W.",ex_ru:"Это победа.",use:"success"},
{word:"L",en:"Loss",ru:"Поражение",ex_en:"Big L.",ex_ru:"Жёсткий проигрыш.",use:"failure"},
{word:"Bruh",en:"Seriously?",ru:"Серьёзно?",ex_en:"Bruh what?",ex_ru:"Серьёзно?",use:"shock"},
{word:"Fr",en:"For real",ru:"Реально",ex_en:"Fr bro.",ex_ru:"Реально.",use:"agreement"},
{word:"Ong",en:"On God",ru:"Клянусь",ex_en:"Ong it's true.",ex_ru:"Клянусь это правда.",use:"strong belief"},
{word:"Idk",en:"I don't know",ru:"Не знаю",ex_en:"Idk man.",ex_ru:"Не знаю.",use:"uncertainty"},
{word:"Irl",en:"In real life",ru:"В реальной жизни",ex_en:"Not like that irl.",ex_ru:"Не так в реальной жизни.",use:"real world"}
];

const random = words[Math.floor(Math.random()*words.length)];
document.getElementById("daily").innerText = "🔥 Word of the day: " + random.word;

function toggleLang(){
    lang = lang==="en"?"ru":"en";
    displayWords();
}

function speakEN(t){ speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
function speakRU(t){ let s=new SpeechSynthesisUtterance(t); s.lang="ru-RU"; speechSynthesis.speak(s); }

function displayWords(){
    const c = document.getElementById("container");
    const search = document.getElementById("search").value.toLowerCase();
    c.innerHTML="";

    words
    .filter(w =>
        w.word.toLowerCase().includes(search) ||
        w.en.toLowerCase().includes(search) ||
        w.ru.toLowerCase().includes(search)
    )
    .forEach(w=>{
        c.innerHTML += `
        <div class="card">
            <div class="word">${w.word}</div>
            <div><b>${lang==="en"?"Meaning":"Перевод"}:</b> ${w[lang]}</div>

            <div class="example">🇺🇸 "${w.ex_en}"</div>
            <div class="example">🇷🇺 "${w.ex_ru}"</div>

            <div class="usage">💡 ${lang==="en"?w.use:"Когда использовать: "+w.use}</div>

            <button onclick="speakEN('${w.word}')">🔊 EN</button>
            <button onclick="speakRU('${w.ex_ru}')">🔊 RU</button>
        </div>
        `;
    });
}

displayWords();
</script>

</body>
</html>
